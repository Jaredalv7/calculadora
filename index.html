<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora basica</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#3ec6e0,#27a8c7);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.calculadora{
    background:#650707;
    padding:25px;
    border-radius:25px;
    width:280px;
    box-shadow:0 15px 30px rgba(0,0,0,0.4);
}

#pantalla{
    width:100%;
    height:60px;
    border:none;
    border-radius:10px;
    background:#1e1d1d;
    color:white;
    font-size:26px;
    text-align:right;
    padding:4px;
    margin-bottom:20px;
}

.botones{
    display:grid;
    grid-template-columns: repeat(4,1fr);
    gap:12px;
}

button{
    height:55px;
    border:none;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}

.numero{
    background:#2f2f2f;
    color:white;
}

.operador{
    background:#ff9500;
    color:white;
}

.igual{
    background:#28a745;
    color:white;
}

.limpiar{
    background:#e63946;
    color:white;
}

button:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>

<div class="calculadora">

<input type="text" id="pantalla" disabled>

<div class="botones">

<button class="numero" onclick="agregar('7')">7</button>
<button class="numero" onclick="agregar('8')">8</button>
<button class="numero" onclick="agregar('9')">9</button>
<button class="operador" onclick="agregar('/')">/</button>

<button class="numero" onclick="agregar('4')">4</button>
<button class="numero" onclick="agregar('5')">5</button>
<button class="numero" onclick="agregar('6')">6</button>
<button class="operador" onclick="agregar('*')">*</button>

<button class="numero" onclick="agregar('1')">1</button>
<button class="numero" onclick="agregar('2')">2</button>
<button class="numero" onclick="agregar('3')">3</button>
<button class="operador" onclick="agregar('-')">-</button>

<button class="numero" onclick="agregar('0')">0</button>
<button class="limpiar" onclick="limpiar()">C</button>
<button class="igual" onclick="calcular()">=</button>
<button class="operador" onclick="agregar('+')">+</button>

</div>

</div>

<script>

function agregar(valor){
    document.getElementById("pantalla").value += valor;
}

function limpiar(){
    document.getElementById("pantalla").value = "";
}

function calcular(){
    try{
        let resultado = eval(document.getElementById("pantalla").value);
        document.getElementById("pantalla").value = resultado;
    }catch{
        document.getElementById("pantalla").value = "Error";
    }
}

</script>

</body>
</html>
